<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            background: #f5f5f5;
        }
        h1 { color: #333; text-align: center; }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button.delete { background: #dc3545; }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 200px;
        }
        #message {
            color: green;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>📚 Library App</h1>
    <p id="message"></p>

    <!-- Add Book Form -->
    <div class="card">
        <h3>Add New Book</h3>
        <input type="number" id="bookId" placeholder="ID">
        <input type="text" id="bookTitle" placeholder="Title">
        <input type="text" id="bookAuthor" placeholder="Author">
        <input type="number" id="bookPrice" placeholder="Price">
        <br>
        <button onclick="addBook()">Add Book</button>
    </div>

    <!-- Search Book -->
    <div class="card">
        <h3>🔍 Find Book by ID</h3>
        <input type="number" id="searchId" placeholder="Book ID">
        <button onclick="findBook()">Search</button>
        <div id="searchResult"></div>
    </div>

    <!-- All Books -->
    <div class="card">
        <h3>📖 All Books</h3>
        <button onclick="getAllBooks()">Load All Books</button>
        <div id="bookList"></div>
    </div>

    <script>
        const API = "https://library-api-mc2s.onrender.com/"

        // Get All Books
        async function getAllBooks() {
            const res = await fetch(`${API}/books`)
            const data = await res.json()
            
            let html = ""
            data.books.forEach(book => {
                html += `
                    <div class="card">
                        <b>${book.title}</b> by ${book.author}<br>
                        Price: ₹${book.price} | 
                        Available: ${book.available ? "✅" : "❌"}
                        <button class="delete" 
                            onclick="deleteBook(${book.id})">
                            Delete
                        </button>
                    </div>
                `
            })
            document.getElementById("bookList").innerHTML = html
        }

        // Add Book
        async function addBook() {
            const book = {
                id: parseInt(document.getElementById("bookId").value),
                title: document.getElementById("bookTitle").value,
                author: document.getElementById("bookAuthor").value,
                price: parseFloat(document.getElementById("bookPrice").value),
                available: true
            }

            const res = await fetch(`${API}/books`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(book)
            })
            const data = await res.json()
            document.getElementById("message").innerText = data.msg
            getAllBooks()

        }

        // Find Book
        async function findBook() {
            const id = document.getElementById("searchId").value
            const res = await fetch(`${API}/books/${id}`)
            const data = await res.json()
            
            if (data.detail) {
                document.getElementById("searchResult").innerHTML = 
                    `<p style="color:red">${data.detail}</p>`
            } else {
                document.getElementById("searchResult").innerHTML = `
                    <div class="card">
                        <b>${data.title}</b> by ${data.author}<br>
                        Price: ₹${data.price}
                    </div>
                `
            }
        }

        // Delete Book
        async function deleteBook(id) {
            const res = await fetch(`${API}/books/${id}`, {
                method: "DELETE"
            })
            const data = await res.json()
            document.getElementById("message").innerText = data.msg
            getAllBooks()
        }

        // Page load-ல books show பண்ணு
        getAllBooks()
    </script>

</body>
</html>
